plugins {
    id 'java'
    id 'application'
    id 'com.diffplug.spotless' version '6.25.0'
}

group = 'com.example'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    implementation 'io.github.wallawood:wallawood:0.9.1'
    implementation 'ch.qos.logback:logback-classic:1.5.3'
}

application {
    mainClass = 'com.example.capsule.App'
}

spotless {
    java {
        googleJavaFormat()
    }
}
